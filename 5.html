<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Eksklusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .calculator {
            background-color: #000000;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 20px;
            position: relative;
        }

        .watermark {
            position: absolute;
            top: 40px;
            left: 30px;
            font-size: 11px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        .display {
            color: #ffffff;
            font-size: 85px;
            font-weight: 400;
            text-align: right;
            padding: 20px 10px;
            margin-bottom: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        button {
            border: none;
            border-radius: 50%;
            font-size: 32px;
            font-weight: 600;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            outline: none;
            transition: transform 0.15s ease, background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        button:active {
            transform: scale(0.85);
        }

        .btn-ac {
            background-color: #a5a5a5;
            color: #000;
            font-size: 10px;
            line-height: 1.1;
            padding: 5px;
            font-weight: 800;
        }

        .btn-grey { background-color: #a5a5a5; color: #000; }
        .btn-dark { background-color: #333333; color: #fff; }
        .btn-orange { background-color: #ff9f0a; color: #fff; font-size: 40px; }
        
        .btn-zero {
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 50px;
            justify-content: flex-start;
            padding-left: 35px;
        }

        .btn-equal {
            background: linear-gradient(135deg, #ff4b2b, #ff416c);
            color: white;
            font-size: 45px;
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.4);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 65, 108, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 65, 108, 0.8); }
        }

        /* Update Warna Teks Kejutan Jadi Putih */
        .love-text {
            font-size: 60px;
            color: #ffffff; /* Warna Putih */
            text-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
            font-weight: 800;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="watermark">by:ketua 10a ganteng</div>

        <div class="display" id="display">0</div>
        
        <div class="buttons">
            <button class="btn-ac" onclick="clearDisplay()">AC<br>(AISYAH CANTIK)</button>
            <button class="btn-grey" onclick="appendInput('+/-')">+/-</button>
            <button class="btn-grey" onclick="appendInput('%')">%</button>
            <button class="btn-orange" onclick="appendInput('÷')">÷</button>

            <button class="btn-dark" onclick="appendInput('7')">7</button>
            <button class="btn-dark" onclick="appendInput('8')">8</button>
            <button class="btn-dark" onclick="appendInput('9')">9</button>
            <button class="btn-orange" onclick="appendInput('×')">×</button>

            <button class="btn-dark" onclick="appendInput('4')">4</button>
            <button class="btn-dark" onclick="appendInput('5')">5</button>
            <button class="btn-dark" onclick="appendInput('6')">6</button>
            <button class="btn-orange" onclick="appendInput('-')">−</button>

            <button class="btn-dark" onclick="appendInput('1')">1</button>
            <button class="btn-dark" onclick="appendInput('2')">2</button>
            <button class="btn-dark" onclick="appendInput('3')">3</button>
            <button class="btn-orange" onclick="appendInput('+')">+</button>

            <button class="btn-dark btn-zero" onclick="appendInput('0')">0</button>
            <button class="btn-dark" onclick="appendInput('.')">.</button>
            <button class="btn-equal" onclick="showLove()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let isLoveShown = false;

        function appendInput(value) {
            if (isLoveShown) resetDisplay();
            if (display.innerText === '0' && value !== '.') {
                display.innerText = value;
            } else {
                if (display.innerText.length < 9) display.innerText += value;
            }
        }

        function clearDisplay() { resetDisplay(); }
        function resetDisplay() {
            display.innerText = '0';
            display.className = 'display'; 
            isLoveShown = false;
        }

        function showLove() {
            display.innerText = "I love u";
            display.className = 'display love-text'; 
            isLoveShown = true;
        }
    </script>
</body>
</html>
